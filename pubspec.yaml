name: career_roadmap
description: "Career Roadmap."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.0
  http: ^1.0.0 # For API calls
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.3 # For password hashing
  percent_indicator: ^4.2.2
  fl_chart: ^0.66.2
  video_player: ^2.7.0
  webview_flutter: ^4.2.1
  path_provider: ^2.0.11
  flutter_pdfview: ^1.2.3
  supabase_flutter: ^2.0.0
  flutter_markdown: ^0.7.7+1
  flutter_math_fork: ^0.7.2
  url_launcher: ^6.3.0
  pdfx: ^2.6.0
  syncfusion_flutter_pdfviewer: ^31.1.19
  screen_capture_event: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4 # ← added

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/labor_data.json

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400

# ---- App icon config ----
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
